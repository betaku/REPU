    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. INICIALIZACIÓN DEL MAPA (Esto ya lo tenías)
        var mapReporte = L.map('mapa-reporte').setView([23.7369, -99.1411], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapReporte);

        var marker;

        // 2. EVENTO DE CLIC EN EL MAPA (Geocodificación)
        mapReporte.on('click', function(e) {
            var lat = e.latlng.lat.toFixed(6);
            var lng = e.latlng.lng.toFixed(6);

            document.getElementById('ubicacion-input').value = "Buscando dirección...";
            document.getElementById('lat-input').value = lat;
            document.getElementById('lng-input').value = lng;

            if (marker) {
                mapReporte.removeLayer(marker);
            }

            marker = L.marker([lat, lng]).addTo(mapReporte);

            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                .then(response => response.json())
                .then(data => {
                    let direccion = data.display_name;
                    document.getElementById('ubicacion-input').value = direccion;
                    marker.bindPopup(`<b>Ubicación seleccionada:</b><br>${direccion}`).openPopup();
                })
                .catch(error => {
                    console.error("Error al obtener la dirección:", error);
                    document.getElementById('ubicacion-input').value = `Ubicación: ${lat}, ${lng} (Error de red)`;
                    marker.bindPopup(`Ubicación seleccionada`).openPopup();
                });
        });

        // =========================================================
        // 3. AQUÍ PEGAS EL NUEVO BLOQUE (Envío a la base de datos)
        // =========================================================
        document.getElementById('form-reporte').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue automáticamente

            let formData = new FormData(this);

            if(!document.getElementById('lat-input').value) {
                alert("Por favor, haz clic en el mapa para fijar la ubicación de la incidencia.");
                return;
            }

            fetch('procesar_reporte.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    alert(data.message);
                    this.reset(); 
                    if (marker) mapReporte.removeLayer(marker); 
                    document.getElementById('ubicacion-input').value = ""; 
                } else {
                    alert("Hubo un problema: " + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Ocurrió un error crítico al intentar comunicarse con el servidor.");
            });
        });
    </script>
