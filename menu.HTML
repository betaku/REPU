     <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar mapa
        var map = L.map('mapa-general').setView([23.7369, -99.1411], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        // Cargar datos
        fetch('get_reportes_data.php')
        .then(response => response.json())
        .then(data => {
            // 1. Actualizar contadores (esto ya lo tienes)
            document.getElementById('count-pendientes').textContent = data.stats['Pendiente'] || 0;
            document.getElementById('count-revision').textContent = data.stats['En Revisión'] || 0;
            document.getElementById('count-atendidos').textContent = data.stats['Atendido'] || 0;

            // 2. RENDERIZAR TARJETAS (Agrega esto)
            const container = document.getElementById('contenedor-reportes');
            container.innerHTML = ''; // Limpiar previo

            data.reportes.forEach(rep => {
                // Manejo de imagen - Usar imagen por defecto más profesional
                let fotoSrc = (rep.foto && rep.foto !== 'sin_foto.jpg') ? 'uploads/' + rep.foto : 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=600&q=80';
            
                container.innerHTML += `
                    <div class="card report-post p-3">
                        <img src="${fotoSrc}" class="card-img-top rounded-3" style="height: 150px; object-fit: cover;" onerror="this.src='https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=600&q=80'">
                        <div class="card-body px-0 pt-3">
                            <span class="badge bg-primary mb-2">${rep.estatus}</span>
                            <h6 class="fw-bold mb-2"><i class="fa-solid fa-map-pin text-danger me-2"></i>${rep.calle || 'Ubicación desconocida'}</h6>
                            <p class="small text-muted" style="word-wrap: break-word; overflow-wrap: break-word; white-space: normal;">${rep.descrip || 'Sin descripción'}</p>
                        </div>
                    </div>`;

                // 3. Poner pines en el mapa
                if(rep.latitud && rep.longitud) {
                    L.marker([parseFloat(rep.latitud), parseFloat(rep.longitud)])
                    .addTo(map)
                    .bindPopup("<b>ID:</b> " + rep.idReporte + "<br>Estatus: " + rep.estatus);
                }
            });
        })
        .catch(error => console.error('Error al cargar reportes:', error));
    </script>
