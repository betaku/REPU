<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPU - Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="card card-login p-4 bg-white">
                    
                        
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">REPU</h2>
                        </div>

                        <!-- ═══════════════════════════════════════════════════════ -->
                        <!-- TAB BUTTONS (Cambiar entre Login y Registro) -->
                        <!-- ═══════════════════════════════════════════════════════ -->
                        <div class="btn-group w-100 mb-4" role="tablist">
                            <button class="btn btn-outline-primary flex-grow-1 active" id="tab-login-btn" onclick="showTab('login')">
                                Iniciar Sesión
                            </button>
                            <button class="btn btn-outline-primary flex-grow-1" id="tab-register-btn" onclick="showTab('register')">
                                Registrarse
                            </button>
                        </div>

                        <!-- ═══════════════════════════════════════════════════════ -->
                        <!-- FORMULARIO DE LOGIN -->
                        <!-- ═══════════════════════════════════════════════════════ -->
                        <div id="login" class="tab-content active">
                            <form id="form-login">
                                <h5 class="text-dark fw-semibold mb-3">Iniciar Sesión</h5>

                                <div class="mb-3">
                                    <label for="email-login" class="form-label text-secondary small fw-bold">Correo Electrónico</label>
                                    <input type="email" class="form-control form-control-lg" id="email-login" placeholder="tu@correo.com" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password-login" class="form-label text-secondary small fw-bold">Contraseña</label>
                                    <input type="password" class="form-control form-control-lg" id="password-login" placeholder="••••••••" required>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="remember">
                                        <label class="form-check-label small text-muted" for="remember">Recordarme</label>
                                    </div>
                                    <a href="#" class="small text-decoration-none text-primary">¿Olvidaste tu contraseña?</a>
                                </div>

                                <div id="alert-login" class="alert alert-danger" style="display:none;"></div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg fw-bold" id="btn-login">Ingresar</button>
                                </div>
                            </form>
                        </div>

                        <!-- ═══════════════════════════════════════════════════════ -->
                        <!-- FORMULARIO DE REGISTRO -->
                        <!-- ═══════════════════════════════════════════════════════ -->
                        <div id="register" class="tab-content">
                            <form id="form-register">
                                <h5 class="text-dark fw-semibold mb-3">Crear Nueva Cuenta</h5>

                                <div class="row g-2 mb-3">
                                    <div class="col">
                                        <input type="text" class="form-control form-control-sm" id="reg-nombre" placeholder="Nombre" required>
                                    </div>
                                </div>

                                <div class="row g-2 mb-3">
                                    <div class="col-6">
                                        <input type="text" class="form-control form-control-sm" id="reg-aPat" placeholder="Ap. Paterno" required>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" class="form-control form-control-sm" id="reg-aMat" placeholder="Ap. Materno" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <input type="email" class="form-control form-control-sm" id="reg-email" placeholder="tu@correo.com" required>
                                </div>

                                <div class="mb-3">
                                    <input type="tel" class="form-control form-control-sm" id="reg-cel" placeholder="Teléfono (opcional)">
                                </div>

                                <div class="mb-3">
                                    <input type="password" class="form-control form-control-sm" id="reg-password" placeholder="Contraseña (6+ caracteres)" required>
                                </div>

                                <div class="mb-3">
                                    <input type="password" class="form-control form-control-sm" id="reg-password-confirm" placeholder="Confirmar contraseña" required>
                                </div>

                                <div id="alert-register" class="alert alert-danger" style="display:none;"></div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success btn-lg fw-bold" id="btn-register">Registrarse</button>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // CAMBIAR ENTRE TABS
        // ═══════════════════════════════════════════════════════════════════════
        function showTab(tabName) {
            // Ocultar todos los tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            
            // Mostrar el tab seleccionado
            document.getElementById(tabName).classList.add('active');

            // Actualizar botones
            document.querySelectorAll('[id$="-btn"]').forEach(el => el.classList.remove('btn-primary'));
            document.querySelectorAll('[id$="-btn"]').forEach(el => el.classList.add('btn-outline-primary'));
            
            document.getElementById('tab-' + tabName + '-btn').classList.remove('btn-outline-primary');
            document.getElementById('tab-' + tabName + '-btn').classList.add('btn-primary');
        }

        // ═══════════════════════════════════════════════════════════════════════
        // FORMULARIO LOGIN
        // ═══════════════════════════════════════════════════════════════════════
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email-login').value;
            const password = document.getElementById('password-login').value;
            const btnLogin = document.getElementById('btn-login');
            const alertLogin = document.getElementById('alert-login');

            btnLogin.disabled = true;
            btnLogin.textContent = 'Procesando...';
            alertLogin.style.display = 'none';

            const formData = new FormData();
            formData.append('email', email);
            formData.append('password', password);

            fetch('login.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('¡Bienvenido ' + data.usuario.nombre + '!');
                    window.location.href = data.redirect;
                } else {
                    alertLogin.textContent = data.message;
                    alertLogin.style.display = 'block';
                    btnLogin.disabled = false;
                    btnLogin.textContent = 'Ingresar';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alertLogin.textContent = 'Error de conexión con el servidor';
                alertLogin.style.display = 'block';
                btnLogin.disabled = false;
                btnLogin.textContent = 'Ingresar';
            });
        });

        // ═══════════════════════════════════════════════════════════════════════
        // FORMULARIO REGISTRO
        // ═══════════════════════════════════════════════════════════════════════
        document.getElementById('form-register').addEventListener('submit', function(e) {
            e.preventDefault();

            const nombre = document.getElementById('reg-nombre').value;
            const aPat = document.getElementById('reg-aPat').value;
            const aMat = document.getElementById('reg-aMat').value;
            const email = document.getElementById('reg-email').value;
            const cel = document.getElementById('reg-cel').value;
            const password = document.getElementById('reg-password').value;
            const passwordConfirm = document.getElementById('reg-password-confirm').value;
            const btnRegister = document.getElementById('btn-register');
            const alertRegister = document.getElementById('alert-register');

            btnRegister.disabled = true;
            btnRegister.textContent = 'Registrando...';
            alertRegister.style.display = 'none';

            const formData = new FormData();
            formData.append('nombre', nombre);
            formData.append('aPat', aPat);
            formData.append('aMat', aMat);
            formData.append('email', email);
            formData.append('cel', cel);
            formData.append('password', password);
            formData.append('password_confirm', passwordConfirm);

            fetch('register.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('¡Registro exitoso! Ahora inicia sesión.');
                    document.getElementById('form-register').reset();
                    showTab('login');
                } else {
                    alertRegister.textContent = data.message;
                    alertRegister.style.display = 'block';
                    btnRegister.disabled = false;
                    btnRegister.textContent = 'Registrarse';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alertRegister.textContent = 'Error de conexión con el servidor';
                alertRegister.style.display = 'block';
                btnRegister.disabled = false;
                btnRegister.textContent = 'Registrarse';
            });
        });
    </script>
</body>
</html>
